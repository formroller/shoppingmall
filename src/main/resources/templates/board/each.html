<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymelaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<div class="container px-4 px-lg-5 mt-5">
  <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">

      <th:block th:each="dto:${result.dtoList}">
            <div class="col mb-5">
              <div class="card h-100">
                <!-- Product image-->
                <img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." />
                <!-- Product details-->
                <div class="card-body p-4">
                  <div class="text-center">
                    <!-- Product name-->
                    <h5 class="fw-bolder">[[${dto.title}]]</h5>
                    <!-- Product price-->
                      [[${dto.price}]]원

                  </div>
                </div>
                <!-- Product actions-->
                <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                  <div class="text-center">
<!--                      <a class="btn btn-outline-dark mt-auto"-->
<!--                                              href="@{/board/read(gno=${dto.gno}, page=${result.page},-->
<!--                                              keyword=${result.keyword})}">View options</a>-->
                      <a class="btn btn-outline-dark mt-auto"
                         th:href="@{/board/read(bno=${dto.bno}, page=${result.page},
                                              keyword=${pageRequestDTO.keyword})}">View options</a>
                  </div>
                </div>
              </div>
            </div>

      </th:block>
      </div>
    </div>
</body>
</html>
